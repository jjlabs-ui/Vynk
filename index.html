<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;cursor:none}
body{font-family:'Inter',-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow-x:hidden;transition:background 1s ease,color 1s ease}
*{cursor:none !important;}

#cursor{
  position:fixed;
  pointer-events:none;
  z-index:99999;
  transform:translate(-50%,-50%);
}
#cursor svg{
  filter:drop-shadow(0 0 8px rgba(255,255,255,.6)) drop-shadow(0 0 20px rgba(255,255,255,.2));

}

}
#cursor-ring{display:none !important;}
#particleCanvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0;display:none}
#bgVideo{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;pointer-events:none;}

#splash{transition:opacity .8s ease}

.splash-avatar{width:72px;height:72px;border-radius:50%;object-fit:cover;opacity:.6;filter:grayscale(100%);transition:opacity .3s}

#app{position:relative;z-index:1;width:100%;display:flex;justify-content:center;padding:24px 24px;opacity:0;transition:opacity .7s ease}

.tilt-card{position:relative;border-radius:24px;padding:24px 72px 40px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);transform-style:preserve-3d;transition:transform .1s ease,box-shadow .1s ease,background 1s,border-color 1s;will-change:transform;max-width:680px;width:100%}
.tilt-card::before{content:'';position:absolute;inset:0;border-radius:24px;background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(128,128,128,.07) 0%,transparent 60%);pointer-events:none;opacity:0;transition:opacity .2s}
.tilt-card:hover::before{opacity:1}
.tilt-card::after{content:'';position:absolute;inset:-1px;border-radius:25px;background:linear-gradient(135deg,rgba(128,128,128,.12) 0%,transparent 40%,transparent 60%,rgba(128,128,128,.07) 100%);pointer-events:none;opacity:0;transition:opacity .3s}
.tilt-card:hover::after{opacity:1}

.tilt-inner{transform-style:preserve-3d;display:flex;flex-direction:column;align-items:center;gap:16px;width:100%}
.tilt-inner > *{transform:translateZ(18px);opacity:0;animation:itemIn .5s ease forwards}
.tilt-inner > *:nth-child(1){animation-delay:.1s}.tilt-inner > *:nth-child(2){animation-delay:.2s}.tilt-inner > *:nth-child(3){animation-delay:.3s}.tilt-inner > *:nth-child(4){animation-delay:.4s}.tilt-inner > *:nth-child(5){animation-delay:.5s}.tilt-inner > *:nth-child(6){animation-delay:.6s}.tilt-inner > *:nth-child(7){animation-delay:.7s}.tilt-inner > *:nth-child(8){animation-delay:.8s}.tilt-inner > *:nth-child(9){animation-delay:.9s}.tilt-inner > *:nth-child(10){animation-delay:1s}.tilt-inner > *:nth-child(11){animation-delay:1.1s}
@keyframes itemIn{from{opacity:0;transform:translateZ(18px) translateY(14px)}to{opacity:1;transform:translateZ(18px) translateY(0)}}

.views-badge{position:absolute;bottom:-8px;right:-16px;display:flex;align-items:center;gap:4px;border-radius:20px;padding:3px 9px;font-size:10px;white-space:nowrap;backdrop-filter:blur(8px);z-index:10;transition:background .8s,color .8s,border-color .8s}
.views-badge svg{transition:transform .3s ease,filter .3s ease;}
.views-badge.pulse svg{animation:eyePulse .6s ease;filter:drop-shadow(0 0 6px rgba(255,255,255,.6));}
@keyframes eyePulse{0%{transform:scale(1);}30%{transform:scale(1.5);}60%{transform:scale(0.9);}100%{transform:scale(1);}}

.avatar-ring{width:90px;height:90px;border-radius:50%;padding:2px;margin-top:0px;transition:background 1s}
.avatar{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block;transition:filter .5s}

.name{font-family:'Uncial Antiqua',serif;font-size:22px;font-weight:400;letter-spacing:2px;margin-top:-4px;transition:color 1s,text-shadow 1s;animation:nameFlicker 7s ease-in-out infinite;position:relative}
.name::before,.name::after{content:attr(data-text);position:absolute;left:0;top:0;width:100%;color:inherit}
.name::before{animation:glitch1 5s infinite;clip-path:polygon(0 0,100% 0,100% 35%,0 35%);opacity:0}
.name::after{animation:glitch2 5s infinite;clip-path:polygon(0 65%,100% 65%,100% 100%,0 100%);opacity:0}
@keyframes glitch1{0%,88%,100%{opacity:0}90%{opacity:.7;transform:translateX(-4px)}92%{opacity:0}95%{opacity:.4;transform:translateX(3px)}97%{opacity:0}}
@keyframes glitch2{0%,88%,100%{opacity:0}91%{opacity:.6;transform:translateX(4px)}93%{opacity:0}96%{opacity:.3;transform:translateX(-3px)}98%{opacity:0}}
@keyframes nameFlicker{0%,100%{opacity:1}91%{opacity:1}92%{opacity:.2}93%{opacity:1}96%{opacity:.15}97%{opacity:1}}

.badges-row{display:flex;gap:8px;align-items:center;margin-top:-6px}
.badge-svg{font-size:22px;opacity:.85;transition:transform .2s,opacity .2s;cursor:default;flex-shrink:0;position:relative;display:flex;align-items:center;justify-content:center;user-select:none}

.badge-svg::after{content:attr(title);position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%) translateY(4px);background:#0a0a0a;border-radius:12px;color:#fff;font-size:12px;font-family:'Inter',sans-serif;font-weight:700;letter-spacing:.5px;padding:7px 16px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s,transform .15s;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.badge-svg:hover::after{opacity:1;transform:translateX(-50%) translateY(0)}

.tags-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.tag{display:inline-flex;align-items:center;border-radius:20px;padding:4px 16px;font-size:11px;letter-spacing:.8px;text-transform:uppercase;transition:border .8s,color .8s,background .8s;cursor:default;position:relative;overflow:hidden}
.tag::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(128,128,128,.12),transparent);animation:tagShimmer 3.5s ease-in-out infinite}
@keyframes tagShimmer{0%{left:-100%}50%,100%{left:150%}}

.bio{font-size:12.5px;text-align:center;line-height:1.8;font-style:italic;max-width:300px;transition:color 1s;letter-spacing:.2px}

.location{display:flex;align-items:center;gap:5px;font-size:11px;margin-top:-6px;transition:color 1s;letter-spacing:.3px}

.divider{width:100%;height:1px;transition:background 1s;margin:2px 0}

.socials-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center}
.social-icon{width:30px;height:30px;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:color .2s,transform .2s,opacity .2s;background:none;border:none;position:relative;opacity:.5;color:inherit}
.social-icon::after{content:attr(title) ' →';position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%) translateY(4px);background:#0a0a0a;border-radius:12px;color:#fff;font-size:12px;font-family:'Inter',sans-serif;font-weight:600;padding:7px 14px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s,transform .15s;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.5)}

.profile-card-left{display:flex;align-items:center;gap:12px}
.profile-avatar-wrap{position:relative;width:46px;height:46px;flex-shrink:0}

.online-dot{position:absolute;bottom:-2px;right:-2px;width:18px;height:18px;border-radius:50%;background:#080808;display:flex;align-items:center;justify-content:center;padding:2px;line-height:0}
.online-dot::after{display:none}
@keyframes dndPulse{0%,100%{box-shadow:0 0 0 0 rgba(242,63,67,.4)}50%{box-shadow:0 0 0 5px rgba(242,63,67,0)}}
.profile-text{display:flex;flex-direction:column;gap:3px}

.profile-badges{display:flex;gap:4px;margin-top:4px;align-items:center;flex-wrap:wrap}
.profile-badge-svg{width:20px;height:20px;opacity:.9;object-fit:contain;flex-shrink:0}
.profile-btn{font-size:11px;font-weight:600;background:none;border:none;padding:6px 14px;border-radius:8px;transition:color .2s,background .8s;white-space:nowrap;cursor:none;letter-spacing:.3px}

.music-player{width:100%;display:flex;gap:10px;padding:10px 16px;border-radius:50px;transition:background .8s,border .8s;align-items:center}
.music-top{display:flex;align-items:center;gap:12px}
.music-cover-wrap{position:relative;flex-shrink:0}
.music-cover{width:54px;height:54px;border-radius:10px;object-fit:cover;display:block;transition:filter .5s}

.music-pulse{position:absolute;inset:-3px;border-radius:13px;border:1px solid rgba(128,128,128,.2);animation:pulse 2.5s ease-in-out infinite;display:none}
.music-pulse.active{display:block}
@keyframes pulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.05;transform:scale(1.07)}}
.music-meta{flex:1;min-width:0;display:flex;align-items:center}
.music-meta-text{flex:1;min-width:0}
.music-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color 1s}
.music-artist{font-size:11px;margin-top:2px;transition:color 1s}
.eq-bars{display:flex;align-items:flex-end;gap:2px;height:16px;margin-left:8px}
.eq-bar{width:3px;border-radius:2px;transform-origin:bottom;transition:background .8s}
.eq-bar.playing{animation:eqAnim var(--spd,.6s) ease-in-out infinite alternate}
@keyframes eqAnim{from{height:3px}to{height:var(--h,12px)}}
.music-row{display:flex;align-items:center;gap:7px;margin-top:8px}
.music-time{font-size:10px;font-variant-numeric:tabular-nums;min-width:30px;flex-shrink:0;transition:color 1s}
.music-time.right{text-align:right}
.prog-wrap{flex:1;height:3px;border-radius:99px;position:relative;cursor:none;transition:background .8s}
#progWrap:hover #progThumb{opacity:1}
.prog-fill{height:100%;border-radius:99px;width:0%;transition:background 1s}
.prog-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:9px;height:9px;border-radius:50%;opacity:0;transition:opacity .15s,background .8s;pointer-events:none}
.music-btns{display:flex;align-items:center;gap:5px}
.ctrl-btn{background:none;border:none;cursor:none;padding:3px;display:flex;align-items:center;justify-content:center;transition:color .15s;border-radius:4px;flex-shrink:0}
.ctrl-btn svg{width:13px;height:13px;fill:currentColor}
.play-btn{border-radius:50%;width:28px;height:28px;transition:background .2s}.play-btn:hover{background:rgba(255,255,255,.2) !important}
.play-btn svg{width:14px;height:14px}
.vol-wrap{display:flex;align-items:center;gap:5px;flex-shrink:0}
.vol-icon svg{width:13px;height:13px;fill:currentColor;transition:color .8s}
input[type=range].vol-slider{-webkit-appearance:none;appearance:none;width:60px;height:3px;border-radius:99px;outline:none;cursor:none;transition:background .8s}
input[type=range].vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:#fff;cursor:none;box-shadow:0 0 4px rgba(255,255,255,.4)}
input[type=range].vol-slider::-moz-range-thumb{width:10px;height:10px;border-radius:50%;border:none;cursor:none}

.platform-row{display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap}
.plat-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:transform .2s,opacity .2s;opacity:.7;position:relative}
.plat-icon:hover{transform:translateY(-3px) scale(1.1);opacity:1}
.plat-icon::after{content:attr(title);position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%) translateY(4px);background:#000;border-radius:8px;color:#fff;font-size:10px;font-family:'Inter',sans-serif;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:5px 10px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s,transform .15s;z-index:100}
.plat-icon:hover::after{opacity:1;transform:translateX(-50%) translateY(0)}

.copyright{font-size:10px;letter-spacing:.5px;text-align:center;user-select:none;transition:color 1s}

.ripple{position:fixed;border-radius:50%;transform:scale(0);animation:rippleAnim .6s ease-out forwards;pointer-events:none;z-index:9997}
@keyframes rippleAnim{to{transform:scale(4);opacity:0}}
@keyframes trailFade{0%{transform:translate(-50%,-50%) scale(1);opacity:.6}100%{transform:translate(-50%,-50%) scale(0);opacity:0}}
@keyframes sparkFade{0%{transform:translate(-50%,-50%) rotate(45deg) scale(1);opacity:.8}100%{transform:translate(calc(-50% + var(--tx,0px)),calc(-50% + var(--ty,0px))) rotate(45deg) scale(0);opacity:0}}
@keyframes burstFade{0%{transform:translate(-50%,-50%) rotate(45deg) scale(1);opacity:.9}100%{transform:translate(calc(-50% + var(--tx,0px)),calc(-50% + var(--ty,0px))) rotate(45deg) scale(0);opacity:0}}

.name-particle{position:fixed;width:2px;height:2px;border-radius:50%;pointer-events:none;animation:particleFly var(--dur,1.5s) ease-out forwards;z-index:9998}
@keyframes particleFly{0%{transform:translate(0,0) scale(1);opacity:.8}100%{transform:translate(var(--tx,0px),var(--ty,-40px)) scale(0);opacity:0}}
body::after{display:none;}
@keyframes cursorBlink{0%,100%{opacity:1;}50%{opacity:0;}}

  .tilt-card{padding:20px 14px 20px !important;border-radius:16px !important;transform:none !important}

}

/* ── Music widget fixo ── */
#musicWidget{
  position:fixed;top:20px;right:20px;z-index:5000;
}
#musicBtn{
  width:40px;height:40px;border-radius:50%;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,.15);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
  cursor:none;transition:background .2s,border-color .2s,transform .2s;
  color:rgba(255,255,255,.7);
  gap:2px;
}

/* barrinhas eq dentro do botão */
.mb-bar{
  width:3px;border-radius:2px;
  background:rgba(255,255,255,.8);
  transform-origin:bottom;
  transition:height .08s ease;
  height:4px;
}

/* ícone de nota musical (pausado) */
#mbNote{
  position:absolute;
  opacity:0;
  transition:opacity .4s ease, transform .4s ease;
  transform:scale(0.6) rotate(-15deg);
  pointer-events:none;
}
#musicBtn.paused #mbNote{
  opacity:1;
  transform:scale(1) rotate(0deg);
  animation:noteBob 2s ease-in-out infinite;
}
#musicBtn.paused .mb-bar{
  opacity:0;
  transition:opacity .3s ease;
}
#musicBtn:not(.paused) .mb-bar{
  opacity:1;
}
@keyframes noteBob{
  0%,100%{transform:scale(1) rotate(-5deg) translateY(0)}
  50%{transform:scale(1.1) rotate(5deg) translateY(-2px)}
}

  <style>
    .act-card{

      0%,100%{transform:translateY(0);}
      50%{transform:translateY(4px);}

  </style>
  <script>
  var actExpanded = true; // Começa aberto
  var actAutoTimer = null;
  var actFirstLoad = true;
  var cachedIconUrls = {}; // Cache de ícones já buscados
  var lastCardsKey = ''; // Pra saber se precisa reconstruir

  function toggleActivities(){
    actExpanded = !actExpanded;
    var chevron = document.getElementById('actChevron');
    var expandBtn = document.getElementById('actExpandBtn');
    var cards = document.querySelectorAll('.act-card.act-secondary-card');

    clearTimeout(actAutoTimer);

    if(actExpanded){
      chevron.classList.add('up');
      expandBtn.classList.remove('hint');
      cards.forEach(function(c, i){
        // Remove hidden class primeiro
        c.classList.remove('act-hidden');
        // Força estado inicial
        c.style.transition = 'none';
        c.style.opacity = '0';
        c.style.maxHeight = '0';
        c.style.transform = 'translateY(-20px)';
        c.style.paddingTop = '0';
        c.style.paddingBottom = '0';
        c.style.marginTop = '0';
        c.style.borderColor = 'transparent';
        c.style.borderWidth = '0';
        c.style.overflow = 'hidden';
        // Força reflow
        c.offsetHeight;
        // Anima pra estado final com delay
        setTimeout(function(){
          c.style.transition = 'all .4s cubic-bezier(.25,.46,.45,.94)';
          c.style.opacity = '1';
          c.style.maxHeight = '150px';
          c.style.transform = 'translateY(0)';
          c.style.paddingTop = '10px';
          c.style.paddingBottom = '10px';
          c.style.marginTop = '';
          c.style.borderColor = c.getAttribute('data-border') || '';
          c.style.borderWidth = '1px';
          c.style.overflow = '';
        }, i * 120);
      });
      actAutoTimer = setTimeout(function(){
        if(actExpanded) toggleActivities();
      }, 15000);
    } else {
      chevron.classList.remove('up');
      var total = cards.length;
      cards.forEach(function(c, i){
        var delay = (total - 1 - i) * 120;
        setTimeout(function(){
          c.style.transition = 'all .35s cubic-bezier(.55,.06,.68,.19)';
          c.style.opacity = '0';
          c.style.maxHeight = '0';
          c.style.transform = 'translateY(-20px)';
          c.style.paddingTop = '0';
          c.style.paddingBottom = '0';
          c.style.borderColor = 'transparent';
          c.style.borderWidth = '0';
          c.style.overflow = 'hidden';
          // Depois da animação, adiciona a classe
          setTimeout(function(){
            c.classList.add('act-hidden');
          }, 350);
        }, delay);
      });
      setTimeout(function(){
        expandBtn.classList.add('hint');
      }, total * 120 + 400);
    }
  }

  function buildActivityCards(data) {
    var container = document.getElementById('actContainer');
    var wrap = document.getElementById('activityWrap');
    var btn = document.getElementById('actExpandBtn');
    if (!container) return;

    var cards = [];

    // Cores por app
    var appColors = {
      'VALORANT': {bg:'rgba(255,70,85,.08)',border:'rgba(255,70,85,.2)',label:'#ff4655'},
      'League of Legends': {bg:'rgba(200,155,60,.08)',border:'rgba(200,155,60,.2)',label:'#c89b3c'},
      'Counter-Strike 2': {bg:'rgba(255,165,0,.08)',border:'rgba(255,165,0,.2)',label:'#ffa500'},
      'Minecraft': {bg:'rgba(80,200,80,.08)',border:'rgba(80,200,80,.2)',label:'#55c055'},
      'Fortnite': {bg:'rgba(0,150,255,.08)',border:'rgba(0,150,255,.2)',label:'#0096ff'},
      'GTA V': {bg:'rgba(100,200,100,.08)',border:'rgba(100,200,100,.2)',label:'#64c864'},
      'Dead by Daylight': {bg:'rgba(200,50,50,.08)',border:'rgba(200,50,50,.2)',label:'#c83232'},
      'Roblox': {bg:'rgba(230,50,50,.08)',border:'rgba(230,50,50,.2)',label:'#e83232'},
      'Apex Legends': {bg:'rgba(200,50,50,.08)',border:'rgba(200,50,50,.2)',label:'#cd3333'},
      'Overwatch 2': {bg:'rgba(255,150,0,.08)',border:'rgba(255,150,0,.2)',label:'#ff9600'},
      'Visual Studio Code': {bg:'rgba(0,120,215,.08)',border:'rgba(0,120,215,.2)',label:'#0078d7'},
      'Call of Duty': {bg:'rgba(255,140,0,.08)',border:'rgba(255,140,0,.2)',label:'#ff8c00'},
      'Black Ops': {bg:'rgba(255,100,0,.08)',border:'rgba(255,100,0,.2)',label:'#ff6400'},
      'Warzone': {bg:'rgba(255,140,0,.08)',border:'rgba(255,140,0,.2)',label:'#ff8c00'},
      'Rainbow Six': {bg:'rgba(255,255,255,.06)',border:'rgba(255,255,255,.15)',label:'#ffffff'},
      'Rocket League': {bg:'rgba(0,120,255,.08)',border:'rgba(0,120,255,.2)',label:'#0078ff'},
      'FIFA': {bg:'rgba(0,100,0,.08)',border:'rgba(0,150,0,.2)',label:'#009600'},
      'EA FC': {bg:'rgba(0,100,0,.08)',border:'rgba(0,150,0,.2)',label:'#009600'},
    };

    var editorApps = ['Visual Studio Code', 'IntelliJ IDEA', 'WebStorm', 'Sublime Text', 'Neovim', 'Cursor'];

    // 1. Coletar atividades tipo 0 (jogos/apps)
    if (data.activities) {
      for (var i = 0; i < data.activities.length; i++) {
        var act = data.activities[i];
        if (act.type === 0) {
          var isEditor = editorApps.some(function(e){ return act.name && act.name.indexOf(e) !== -1; });
          var priority = isEditor ? 2 : 1;

          // Imagem
          var imgUrl = '';
          var appId = act.application_id || '';
          if (act.assets && act.assets.large_image) {
            if (act.assets.large_image.startsWith('mp:')) {
              imgUrl = 'https://media.discordapp.net/' + act.assets.large_image.replace('mp:', '');
            } else if (act.assets.large_image.startsWith('spotify:')) {
              imgUrl = 'https://i.scdn.co/image/' + act.assets.large_image.replace('spotify:', '');
            } else if (appId) {
              imgUrl = 'https://cdn.discordapp.com/app-assets/' + appId + '/' + act.assets.large_image + '.png?size=128';
            }
          }
          // Fallback: usa cache ou marca pra fetch
          if (!imgUrl && appId) {
            if (cachedIconUrls[appId]) {
              imgUrl = cachedIconUrls[appId];
            } else {
              imgUrl = '__FETCH__' + appId;
            }
          }

          var colorKey = Object.keys(appColors).find(function(k){ return act.name && act.name.indexOf(k) !== -1; });
          var color = appColors[colorKey] || {bg:'rgba(88,101,242,.06)',border:'rgba(88,101,242,.12)',label:'rgba(88,101,242,.8)'};

          cards.push({
            id: act.name + '_' + appId,
            priority: priority,
            name: act.name || '',
            detail: act.details || '',
            state: act.state || '',
            img: imgUrl,
            appId: appId,
            color: color,
            label: isEditor ? 'programando' : 'jogando'
          });
        }
      }
    }

    // 2. Spotify (prioridade 3)
    if (data.listening_to_spotify && data.spotify) {
      var sp = data.spotify;
      var pct = 0;
      var spElapsed = 0;
      var spDuration = 0;
      if (sp.timestamps) {
        var now = Date.now();
        spElapsed = Math.min(Math.floor((now - sp.timestamps.start) / 1000), Math.floor((sp.timestamps.end - sp.timestamps.start) / 1000));
        spDuration = Math.floor((sp.timestamps.end - sp.timestamps.start) / 1000);
        pct = Math.min(100, (spElapsed / spDuration) * 100);
      }
      cards.push({
        id: 'spotify',
        priority: 3,
        name: sp.song || '',
        detail: sp.artist || '',
        state: '',
        img: sp.album_art_url || '',
        appId: '',
        color: {bg:'rgba(30,215,96,.06)',border:'rgba(30,215,96,.12)',label:'rgba(30,215,96,.8)'},
        label: 'ouvindo agora',
        isSpotify: true,
        progress: pct,
        elapsed: spElapsed,
        duration: spDuration,
        startTs: sp.timestamps ? sp.timestamps.start : 0,
        endTs: sp.timestamps ? sp.timestamps.end : 0
      });
    }

    cards.sort(function(a,b){ return a.priority - b.priority; });

    var newKey = cards.map(function(c){ return c.id; }).join('|');
    var needsRebuild = (newKey !== lastCardsKey);
    var oldKey = lastCardsKey;

    if (cards.length === 0 && lastCardsKey !== '') {
      // Tudo sumiu — anima saída de todos e esconde
      lastCardsKey = '';
      var allCards = container.querySelectorAll('.act-card');
      allCards.forEach(function(c, i) {
        c.style.transition = 'opacity .3s ease ' + (i * 50) + 'ms, transform .3s ease ' + (i * 50) + 'ms';
        c.style.opacity = '0';
        c.style.transform = 'translateY(-8px) scale(.95)';
      });
      setTimeout(function() {
        container.innerHTML = '';
        if (wrap) wrap.style.display = 'none';
        if (btn) btn.style.display = 'none';
      }, 350 + (allCards.length * 50));
      return;
    }

    if (cards.length === 0) {
      if (wrap) wrap.style.display = 'none';
      return;
    }
    if (wrap) wrap.style.display = 'block';

    if (needsRebuild) {
      // Se tá fechado, reconstrói direto sem animação (cards secundários já vão com act-hidden)
      if (!actExpanded) {
        lastCardsKey = newKey;
        renderCards(container, cards, btn);
      } else {
        // Tá aberto — anima saída só dos cards que vão sair
        var oldIds = oldKey ? oldKey.split('|') : [];

              el.style.overflow = 'hidden';
              el.style.padding = '0 14px';

          lastCardsKey = newKey;
          renderCards(container, cards, btn);

      // Só atualiza textos, imagem e progresso sem reconstruir DOM
      for (var c = 0; c < cards.length; c++) {

        if (!el) continue;
        var nameEl = el.querySelector('[data-name]');
        var detailEl = el.querySelector('[data-detail]');
        var stateEl = el.querySelector('[data-state]');
        if (nameEl && nameEl.textContent !== card.name) nameEl.textContent = card.name;
        if (detailEl && detailEl.textContent !== (card.detail || '')) detailEl.textContent = card.detail || '';
        if (stateEl && stateEl.textContent !== (card.state || '')) stateEl.textContent = card.state || '';

        if (card.isSpotify) {
          var progressEl = el.querySelector('[data-progress]');
          var elapsedEl = el.querySelector('[data-elapsed]');
          var durationEl = el.querySelectorAll('span');
          var imgEl = el.querySelector('img');
          if (progressEl) {
            progressEl.setAttribute('data-start', card.startTs);
            progressEl.setAttribute('data-end', card.endTs);
            progressEl.style.width = card.progress + '%';
          }
          if (elapsedEl) {
            var m = Math.floor(card.elapsed / 60);
            var s = card.elapsed % 60;
            elapsedEl.textContent = (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;

          // Atualiza duração total (último span com min-width:32px e text-align:right)

            var ds = card.duration % 60;
            durSpan.textContent = (dm < 10 ? '0' : '') + dm + ':' + (ds < 10 ? '0' : '') + ds;

          }

    if (btn) btn.style.display = cards.length > 1 ? 'block' : 'none';

    reverbSource=reverbCtx.createMediaElementSource(audio);
    convolver=reverbCtx.createConvolver();
    reverbGain=reverbCtx.createGain();
    dryGain=reverbCtx.createGain();
    reverbGain.gain.value=0.3;
    dryGain.gain.value=0.85;
    // Gera impulse response sintético (reverb)
    var rate=reverbCtx.sampleRate;
    var len=rate*2;
    var impulse=reverbCtx.createBuffer(2,len,rate);
    for(var ch=0;ch<2;ch++){
      var data=impulse.getChannelData(ch);
      for(var i=0;i<len;i++){
        data[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.5);
      }
    }
    convolver.buffer=impulse;
    // Routing: source → dry → destination
    //          source → convolver → reverbGain → destination
    reverbSource.connect(dryGain);
    dryGain.connect(reverbCtx.destination);
    reverbSource.connect(convolver);
    convolver.connect(reverbGain);
    reverbGain.connect(reverbCtx.destination);
  }catch(e){}
}

function fmt(s){var m=Math.floor(s/60),sec=Math.floor(s%60);return(m<10?'0':'')+m+':'+(sec<10?'0':'')+sec;}
function setEq(on){eqBars.forEach(function(b){b.classList.toggle('playing',on)});}
function fetchCover(title,artist,cb){
  fetch('https://itunes.apple.com/search?term='+encodeURIComponent(title+' '+artist)+'&media=music&limit=1')
    .then(function(r){return r.json()})

// ── Web Audio Analyser ────────────────────────────────────
var audioCtx=null,analyser=null,source=null,dataArr=null,rafId=null;
var mbBars=[
  document.getElementById('mbBar1'),
  document.getElementById('mbBar2'),
  document.getElementById('mbBar3'),
  document.getElementById('mbBar4')
];
// frequência bands para cada barrinha (índices no array de 128 bins)
var bands=[2,6,14,28];

function initAudioCtx(){
  if(audioCtx)return;
  // Usa o mesmo contexto do reverb se já existe
  if(reverbCtx){
    audioCtx=reverbCtx;
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=256;
    analyser.smoothingTimeConstant=0.75;
    dataArr=new Uint8Array(analyser.frequencyBinCount);
    // Conecta o analyser na saída do dry
    if(dryGain){dryGain.connect(analyser);}
    else if(reverbSource){reverbSource.connect(analyser);}
  } else {
    try{
      audioCtx=new(window.AudioContext||window.webkitAudioContext)();
      analyser=audioCtx.createAnalyser();
      analyser.fftSize=256;
      analyser.smoothingTimeConstant=0.75;
      dataArr=new Uint8Array(analyser.frequencyBinCount);
      source=audioCtx.createMediaElementSource(audio);
      source.connect(analyser);
      analyser.connect(audioCtx.destination);
    }catch(e){}
  }
}

function eqLoop(){
  if(!analyser||!dataArr){rafId=null;return;}
  rafId=requestAnimationFrame(eqLoop);
  analyser.getByteFrequencyData(dataArr);
  mbBars.forEach(function(bar,i){
    if(!bar)return;
    var val=dataArr[bands[i]]||0;
    // mapeia 0-255 → 3px-22px
    var h=3+Math.round((val/255)*19);
    bar.style.height=h+'px';
  });
}

function startEqLoop(){
  if(rafId)return;
  eqLoop();
}
function stopEqLoop(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  // reset barrinhas para alturas estáticas
  var defaults=[5,9,6,11];
  mbBars.forEach(function(bar,i){if(bar)bar.style.height=defaults[i]+'px';});
}

function loadTrack(idx){
  var t=playlist[idx];
  audio.src=t.src;
  if(mpTitle)mpTitle.textContent=t.title;
  if(mpArtist)mpArtist.textContent=t.artist;
  if(mpDur)mpDur.textContent='00:00';
  if(mpCur)mpCur.textContent='00:00';
  if(mpFill)mpFill.style.width='0%';
  if(mpThumb)mpThumb.style.left='0%';
  if(mpCover)fetchCover(t.title,t.artist,function(url){mpCover.src=url;});
}

function playTrack(){
  initReverb();
  if(reverbCtx&&reverbCtx.state==='suspended')reverbCtx.resume();
  initAudioCtx();
  if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
  audio.play().catch(function(){});
  if(mpIPlay)mpIPlay.style.display='none';
  if(mpIPause)mpIPause.style.display='block';
  if(mpPlay)mpPlay.classList.add('playing');
  var btn=document.getElementById('musicBtn');
  if(btn){btn.classList.add('playing');btn.classList.remove('paused');}
  setEq(true);
  startEqLoop();
}

function pauseTrack(){
  audio.pause();
  if(mpIPlay)mpIPlay.style.display='block';
  if(mpIPause)mpIPause.style.display='none';
  if(mpPlay)mpPlay.classList.remove('playing');
  var btn=document.getElementById('musicBtn');
  if(btn){btn.classList.remove('playing');btn.classList.add('paused');}
  setEq(false);
  stopEqLoop();
}

function nextTrack(){trackIdx=(trackIdx+1)%playlist.length;loadTrack(trackIdx);playTrack();}
function mpNext(){nextTrack();}
function mpPrev(){trackIdx=(trackIdx-1+playlist.length)%playlist.length;loadTrack(trackIdx);playTrack();}

audio.addEventListener('loadedmetadata',function(){
  if(mpDur)mpDur.textContent=fmt(audio.duration);
});
audio.addEventListener('timeupdate',function(){
  if(!audio.duration)return;
  var pct=(audio.currentTime/audio.duration)*100;
  if(mpFill)mpFill.style.width=pct+'%';
  if(mpThumb)mpThumb.style.left=pct+'%';
  if(mpCur)mpCur.textContent=fmt(audio.currentTime);
});
audio.addEventListener('ended',nextTrack);

if(mpPlay)mpPlay.addEventListener('click',function(){if(audio.paused){playTrack();}else{pauseTrack();}});
if(mpBar)mpBar.addEventListener('click',function(e){
  var r=this.getBoundingClientRect();
  audio.currentTime=((e.clientX-r.left)/r.width)*(audio.duration||0);
});
if(mpVol)mpVol.addEventListener('input',function(){audio.volume=parseFloat(this.value);});

document.addEventListener('click',function(e){

// ── Tilt 3D ───────────────────────────────────────────────
var card=document.getElementById('tiltCard');
card.addEventListener('mousemove',function(e){
  var b=card.getBoundingClientRect();
  var dx=(e.clientX-b.left-b.width/2)/(b.width/2),dy=(e.clientY-b.top-b.height/2)/(b.height/2);
  var rX=-dy*14,rY=dx*14;
  card.style.transform='perspective(1000px) rotateX('+rX+'deg) rotateY('+rY+'deg) scale3d(1.018,1.018,1.018)';
  card.style.setProperty('--mx',((e.clientX-b.left)/b.width*100).toFixed(1)+'%');
  card.style.setProperty('--my',((e.clientY-b.top)/b.height*100).toFixed(1)+'%');
});
card.addEventListener('mouseleave',function(){
  card.style.transform='perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1,1,1)';
});

// ── Lanyard (Discord presence em tempo real) ──────────────
(function(){
  var DISCORD_ID = '300679614680793088';
  var ws = null;
  var heartbeat = null;

  function updatePresence(data) {
    if (!data) return;

    // Avatar
    var avatarEl = document.getElementById('discordAvatar');
    var mainAvatarEl = document.getElementById('mainAvatar');
    if (data.discord_user && data.discord_user.avatar) {
      var ext = data.discord_user.avatar.startsWith('a_') ? 'gif' : 'png';
      var avatarUrl = 'https://cdn.discordapp.com/avatars/' + DISCORD_ID + '/' + data.discord_user.avatar + '.' + ext + '?size=256';
      if (avatarEl) avatarEl.src = avatarUrl;
      if (mainAvatarEl) mainAvatarEl.src = avatarUrl;
    }

    // Username
    var nameEl = document.getElementById('discordName');
    if (nameEl && data.discord_user) {
      nameEl.textContent = data.discord_user.display_name || data.discord_user.global_name || data.discord_user.username;
    }

    // Tag (clan/guild tag) — dinâmica via API
    var tagEl = document.getElementById('tagText');
    var tagContainer = document.getElementById('profileTag');
    var tagIconEl = document.getElementById('tagIcon');
    if (data.discord_user && data.discord_user.primary_guild && data.discord_user.primary_guild.tag) {
      if (tagEl) tagEl.textContent = data.discord_user.primary_guild.tag;
      if (tagContainer) tagContainer.style.display = 'flex';
      // Badge icon do clan
      if (tagIconEl && data.discord_user.primary_guild.badge) {
        var guildId = data.discord_user.primary_guild.identity_guild_id || '';
        var badgeHash = data.discord_user.primary_guild.badge;
        var badgeUrl = 'https://cdn.discordapp.com/clan-badges/' + guildId + '/' + badgeHash + '.png?size=32';
        tagIconEl.innerHTML = '<img src="' + badgeUrl + '" width="14" height="14" style="border-radius:2px;object-fit:contain;" onerror="this.parentElement.textContent=\'🏷️\'" />';
      }
    } else {
      // Sem tag — esconde
      if (tagContainer) tagContainer.style.display = 'none';
    }

    // Status dot
    var dot = document.getElementById('onlineDot');
    var statusCircle = document.getElementById('statusCircle');
    if (statusCircle) {
      var colors = { online: '#3ba55c', idle: '#f9a825', dnd: '#ed4245', offline: '#747f8d' };
      var masks = { online: 'url(#status-mask-online)', idle: 'url(#status-mask-idle)', dnd: 'url(#status-mask-dnd)', offline: 'url(#status-mask-offline)' };
      var st = data.discord_status || 'offline';
      statusCircle.setAttribute('fill', colors[st] || colors.offline);
      statusCircle.setAttribute('mask', masks[st] || masks.offline);
    }

    // Custom status
    var statusEl = document.getElementById('discordStatus');
    if (statusEl) {
      var customActivity = null;
      if (data.activities) {
        for (var i = 0; i < data.activities.length; i++) {
          if (data.activities[i].type === 4) { customActivity = data.activities[i]; break; }
        }
      }
      if (customActivity && customActivity.state) {
        var emojiHtml = '';
        if (customActivity.emoji) {
          if (customActivity.emoji.id) {
            // Emoji customizado — puxar imagem do CDN do Discord
            var emojiExt = customActivity.emoji.animated ? 'gif' : 'png';
            emojiHtml = '<img src="https://cdn.discordapp.com/emojis/' + customActivity.emoji.id + '.' + emojiExt + '?size=20" width="16" height="16" style="vertical-align:-3px;margin-right:4px;border-radius:2px;" />';
          } else {
            // Emoji unicode padrão
            emojiHtml = '<span style="margin-right:4px;">' + customActivity.emoji.name + '</span>';
          }
        }
        statusEl.innerHTML = emojiHtml + customActivity.state;
        statusEl.style.display = 'block';
      } else {
        statusEl.style.display = 'none';
      }
    }

    // Spotify e atividades — renderiza tudo junto
    buildActivityCards(data);

    if (data.listening_to_spotify) {
      spotifyActive = true;
      lanyardReady = true;
      window._spotifyTrackId = (data.spotify && data.spotify.track_id) || '';
      onLanyardFirstResponse(data);
    } else {
      if (spotifyActive) {
        spotifyActive = false;
      }
      onLanyardFirstResponse(data);
    }
  }

  function connectWS() {
    ws = new WebSocket('wss://api.lanyard.rest/socket');
    ws.onmessage = function(event) {
      var msg = JSON.parse(event.data);
      if (msg.op === 1) {
        // Hello — send subscribe + start heartbeat
        ws.send(JSON.stringify({ op: 2, d: { subscribe_to_id: DISCORD_ID } }));
        heartbeat = setInterval(function() {
          if (ws.readyState === 1) ws.send(JSON.stringify({ op: 3 }));
        }, msg.d.heartbeat_interval);
      }
      if (msg.op === 0) {
        // Event
        if (msg.t === 'INIT_STATE' || msg.t === 'PRESENCE_UPDATE') {
          updatePresence(msg.d);
        }
      }
    };
    ws.onclose = function() {
      clearInterval(heartbeat);
      setTimeout(connectWS, 5000);
    };
    ws.onerror = function() { ws.close(); };
  }

  connectWS();

  // Spotify progress updater — atualiza barra e tempo a cada segundo localmente
  setInterval(function() {
    var spotifyCard = document.querySelector('[data-card-id="spotify"]');
    if (!spotifyCard) return;
    var bar = spotifyCard.querySelector('[data-progress]');
    if (!bar) return;
    var start = parseInt(bar.getAttribute('data-start'));
    var end = parseInt(bar.getAttribute('data-end'));
    if (!start || !end) return;
    var now = Date.now();
    var duration = Math.floor((end - start) / 1000);
    var elapsed = Math.min(Math.floor((now - start) / 1000), duration);
    if (elapsed < 0) elapsed = 0;
    var pct = Math.min(100, (elapsed / duration) * 100);
    bar.style.width = pct + '%';
    var elapsedEl = spotifyCard.querySelector('[data-elapsed]');
    if (elapsedEl) {
      var m = Math.floor(elapsed / 60);
      var s = elapsed % 60;
      elapsedEl.textContent = (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
    }
  }, 1000);
})();
